<!DOCTYPE html>
<html>
<head>
    <title>Pitch Visualizer</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        select {
            padding: 8px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #555;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>
</head>

<body>

    <div class="container">
        <h1>🎬 Pitch Visualizer</h1>

        <form action="/generate" method="post" onsubmit="showLoading()">
            
            <textarea name="story" placeholder="Paste your story here..." required></textarea>
            
            <br>

            <label><b>Select Style:</b></label><br>
            <select name="style">
                <option>Digital Art</option>
                <option>Photorealistic</option>
                <option>Cartoon</option>
                <option>Anime</option>
            </select>

            <br>
            <button type="submit">Generate Storyboard 🚀</button>

            <div id="loading" class="loading">
                ⏳ Generating your storyboard...
            </div>

        </form>
    </div>

</body>
</html>
