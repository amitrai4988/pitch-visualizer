<!DOCTYPE html>
<html>
<head>
    <title>Storyboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .panel {
            background: #1f1f3a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .panel:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #000;
        }

        .content {
            padding: 15px;
        }

        .scene-title {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 5px;
        }

        .caption {
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .prompt {
            font-size: 12px;
            color: #888;
            font-style: italic;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin: 30px;
        }

        .back-btn a {
            text-decoration: none;
            color: white;
            background: #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .back-btn a:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

    <h1>🎞️ Your Storyboard</h1>

    <div class="container">
        {% for panel in storyboard %}
            <div class="panel">
                
                <!-- 🔥 FIXED IMAGE TAG -->
                <img src="{{ panel.image }}" 
                     onerror="this.onerror=null; this.src='https://picsum.photos/512/512';">

                <div class="content">
                    <div class="scene-title">
                        Scene {{ loop.index }}
                    </div>

                    <div class="caption">
                        {{ panel.text }}
                    </div>

                    <!-- 🔥 BONUS: Show prompt (optional but impressive) -->
                    <div class="prompt">
                        {{ panel.prompt }}
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="back-btn">
        <a href="/">⬅ Generate Another</a>
    </div>

</body>
</html>
